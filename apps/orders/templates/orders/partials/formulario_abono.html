<div>
    <div class="mb-3">
        <label class="form-label">Monto del abono (consumo):</label>
        <div class="input-group">
            <span class="input-group-text">$</span>
            <input type="number" id="abono-amount" name="monto" class="form-control" placeholder="Ingrese monto" min="100" max="{{ max_amount|floatformat:0 }}" step="100" required>
        </div>
        <small class="text-muted">Máximo: ${{ max_amount|floatformat:0 }}</small>
    </div>
    
    {% include "orders/partials/propina_input.html" with tip_selector_id=tip_selector_id %}
    
    <button type="button" class="btn btn-primary w-100" onclick="submitAbono('{{ order.id }}', event)">
        <i class="bi bi-cash me-1"></i>Registrar Abono
    </button>
</div>
