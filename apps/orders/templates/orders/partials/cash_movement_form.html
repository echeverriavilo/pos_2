<div class="modal-header">
    <h5 class="modal-title">Registrar Movimiento Manual</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<div class="modal-body">
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <form method="post" action="{% url 'orders:sesion-movimiento' session.id %}">
        {% csrf_token %}
        <div class="mb-3">
            <label for="tipo" class="form-label">Tipo</label>
            <select class="form-select" id="tipo" name="tipo" required>
                <option value="INGRESO">Ingreso (efectivo)</option>
                <option value="EGRESO">Egreso (efectivo)</option>
                <option value="AJUSTE">Ajuste (cualquier medio)</option>
            </select>
            <div class="form-text" id="tipo-ayuda">Entrada de efectivo a caja</div>
        </div>
        <div class="mb-3" id="div-payment-method" style="display: none;">
            <label for="payment_method_id" class="form-label">Medio de pago</label>
            <select class="form-select" id="payment_method_id" name="payment_method_id">
                {% for pm in payment_methods %}
                <option value="{{ pm.id }}">{{ pm.nombre }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3" id="div-signo" style="display: none;">
            <label class="form-label">Tipo de ajuste</label>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="signo_ajuste" id="signo_positivo" value="positivo" checked>
                <label class="form-check-label" for="signo_positivo"><span class="text-success">Crédito (+)</span></label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="signo_ajuste" id="signo_negativo" value="negativo">
                <label class="form-check-label" for="signo_negativo"><span class="text-danger">Débito (-)</span></label>
            </div>
        </div>
        <div class="mb-3">
            <label for="monto" class="form-label" id="label-monto">Monto</label>
            <input type="number" class="form-control" id="monto" name="monto" min="0.01" step="0.01" required>
        </div>
        <div class="mb-3">
            <label for="descripcion" class="form-label">Descripción</label>
            <input type="text" class="form-control" id="descripcion" name="descripcion" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Registrar</button>
    </form>
</div>

<script>
(function() {
    var tipoSelect = document.getElementById('tipo');
    var tipoAyuda = document.getElementById('tipo-ayuda');
    var divPm = document.getElementById('div-payment-method');
    var pmSelect = document.getElementById('payment_method_id');
    var divSigno = document.getElementById('div-signo');

    var ayudas = {
        'INGRESO': 'Entrada de efectivo a caja',
        'EGRESO': 'Retiro de efectivo de caja',
        'AJUSTE': 'Ajuste contable por cualquier medio de pago'
    };

    function updateUI() {
        var tipo = tipoSelect.value;
        tipoAyuda.textContent = ayudas[tipo] || '';
        if (tipo === 'AJUSTE') {
            divPm.style.display = 'block';
            divSigno.style.display = 'block';
            pmSelect.required = true;
        } else {
            divPm.style.display = 'none';
            divSigno.style.display = 'none';
            pmSelect.required = false;
        }
    }

    tipoSelect.addEventListener('change', updateUI);
    updateUI();
})();
</script>
