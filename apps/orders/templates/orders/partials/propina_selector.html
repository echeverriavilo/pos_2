<div class="d-flex justify-content-between align-items-center mb-1">
    <span>Propina:</span>
    <div class="d-flex align-items-center gap-1" id="propina-buttons">
        <button type="button" class="btn btn-sm {% if order.propina_monto == 0 %}btn-secondary{% else %}btn-outline-secondary{% endif %}" onclick="applyTip('{{ order.id }}', '0')">0%</button>
        <button type="button" class="btn btn-sm {% if order.propina_monto > 0 %}btn-primary{% else %}btn-outline-primary{% endif %}" onclick="applyTip('{{ order.id }}', '{{ suggested_tip|floatformat:0 }}')">10%</button>
        <button type="button" class="btn btn-sm btn-outline-info" onclick="toggleTipCustomPct('{{ order.id }}')"><i class="bi bi-percent"></i></button>
        <button type="button" class="btn btn-sm btn-outline-dark" onclick="toggleTipCustomFixed('{{ order.id }}')"><i class="bi bi-currency-dollar"></i></button>
        <span class="fw-bold ms-2 {% if order.propina_monto > 0 %}text-success{% else %}text-muted{% endif %}" id="propina-display">${{ order.propina_monto|floatformat:0 }}</span>
    </div>
</div>
