<div class="tip-selector" id="{{ tip_selector_id }}">
    <label class="form-label small">Propina (opcional):</label>
    <div class="input-group input-group-sm mb-1">
        <span class="input-group-text">$</span>
        <input type="number" class="form-control tip-amount-input" id="{{ tip_selector_id }}-amount" value="0" min="0" step="100">
    </div>
    <div class="d-flex gap-1 mb-2 flex-wrap">
        <button type="button" class="btn btn-outline-secondary btn-sm tip-mode-btn active" data-mode="pct" data-pct="0">Sin propina</button>
        <button type="button" class="btn btn-outline-primary btn-sm tip-mode-btn" data-mode="pct" data-pct="10">10%</button>
        <button type="button" class="btn btn-outline-info btn-sm tip-mode-btn" data-mode="custom-pct">Otro %</button>
    </div>
    <div class="custom-pct-input mb-2" style="display:none;">
        <div class="input-group input-group-sm">
            <input type="number" class="form-control custom-pct-value" value="15" min="0" max="100" step="1" placeholder="%">
            <span class="input-group-text">%</span>
        </div>
    </div>
    <div class="border rounded p-2 mb-1 bg-light">
        <div class="d-flex justify-content-between align-items-center">
            <span class="small text-muted">Total a pagar</span>
            <span class="fs-5 fw-bold text-dark tip-total-display">$0</span>
        </div>
    </div>
</div>
