{% extends "grastro/base.html" %}

{% block title %}Editar Caja - Gastropos{% endblock %}
{% block header_title %}Editar Caja{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0"><i class="bi bi-pencil me-2"></i>Editar Caja: {{ cash_register.nombre }}</h5>
                </div>
                <div class="card-body">
                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}
                    <form method="post" action="{% url 'orders:caja-editar' cash_register.id %}">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="nombre" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="nombre" name="nombre" value="{{ cash_register.nombre }}" required>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" id="soporta_flujo_mesa" name="soporta_flujo_mesa" {% if cash_register.soporta_flujo_mesa %}checked{% endif %}>
                            <label class="form-check-label" for="soporta_flujo_mesa">Soporta flujo con mesa</label>
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="soporta_flujo_rapido" name="soporta_flujo_rapido" {% if cash_register.soporta_flujo_rapido %}checked{% endif %}>
                            <label class="form-check-label" for="soporta_flujo_rapido">Soporta flujo rápido</label>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'orders:caja-lista' %}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
